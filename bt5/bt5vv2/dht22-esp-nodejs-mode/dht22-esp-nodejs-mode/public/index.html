<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IoT Dashboard – DHT22</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px;
      gap: 20px;
    }

    h1 { font-size: 1.5rem; color: #7dd3fc; letter-spacing: 0.05em; }

    /* ── Status bar ── */
    #status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 0.9rem;
      flex-wrap: wrap;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #ef4444;
      transition: background 0.3s;
      flex-shrink: 0;
    }
    .dot.on { background: #22c55e; box-shadow: 0 0 8px #22c55e; }

    /* ── Mode banner ── */
    #mode-banner {
      width: 100%;
      max-width: 740px;
      background: rgba(30,41,59,0.85);
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 14px;
    }
    #mode-banner h2 {
      font-size: 0.8rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    #mode-info { display: flex; align-items: center; gap: 12px; }

    /* ── Badge ── */
    .badge {
      display: inline-block;
      padding: 5px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .badge-normal      { background: #166534; color: #4ade80; }
    .badge-warning     { background: #713f12; color: #fbbf24; }
    .badge-alarm       { background: #7f1d1d; color: #f87171; }
    .badge-error       { background: #3b0764; color: #e879f9; }
    .badge-mode-auto   { background: #1e3a5f; color: #7dd3fc; border: 1px solid #3b82f6; }
    .badge-mode-manual { background: #3b2a1a; color: #fb923c; border: 1px solid #f97316; }

    /* ── Mode buttons ── */
    .mode-btns { display: flex; gap: 10px; }
    .btn-mode {
      padding: 9px 22px;
      border: 2px solid #334155;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: #94a3b8;
      transition: all 0.2s ease;
    }
    .btn-mode:hover { border-color: #64748b; color: #e2e8f0; }
    .btn-mode.active[data-mode="AUTO"]   {
      background: #1e3a5f; color: #7dd3fc;
      border-color: #3b82f6;
      box-shadow: 0 0 12px rgba(59,130,246,0.3);
    }
    .btn-mode.active[data-mode="MANUAL"] {
      background: #3b2a1a; color: #fb923c;
      border-color: #f97316;
      box-shadow: 0 0 12px rgba(249,115,22,0.3);
    }

    /* ── Grid cards ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 740px;
    }
    .card {
      background: rgba(30,41,59,0.85);
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 24px;
      text-align: center;
    }
    .card-label {
      font-size: 0.75rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .card-value {
      font-size: 2.6rem;
      font-weight: 700;
      color: #7dd3fc;
    }
    .card-unit { font-size: 1rem; color: #64748b; margin-left: 4px; }
    .card-state-wrap { margin-top: 6px; }

    /* ── Control card ── */
    #ctrl-card {
      width: 100%;
      max-width: 740px;
      background: rgba(30,41,59,0.85);
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 24px;
    }
    #ctrl-card h2 {
      font-size: 0.8rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
    }

    .ctrl-row {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .ctrl-row:last-child { margin-bottom: 0; }
    .ctrl-label { font-size: 0.9rem; color: #cbd5e1; min-width: 80px; }

    /* Device state text */
    #fan-state-text, #buzzer-state-text {
      font-size: 1.1rem;
      font-weight: 700;
      min-width: 42px;
    }
    #fan-state-text.on,    #buzzer-state-text.on  { color: #22c55e; }
    #fan-state-text.off,   #buzzer-state-text.off { color: #ef4444; }

    /* Disabled overlay hint */
    .auto-lock-hint {
      font-size: 0.75rem;
      color: #475569;
      font-style: italic;
      display: none;
    }
    body.mode-auto .auto-lock-hint { display: inline; }

    /* ── Buttons ── */
    .btn {
      padding: 10px 26px;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn:hover:not(:disabled) { transform: translateY(-2px); }
    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none !important;
      filter: grayscale(0.5);
    }
    .btn-on     { background: #16a34a; color: #fff; }
    .btn-on:hover:not(:disabled)  { background: #15803d; }
    .btn-off    { background: #dc2626; color: #fff; }
    .btn-off:hover:not(:disabled) { background: #b91c1c; }
    .btn-buzzer { background: linear-gradient(135deg, #7c3aed, #db2777); color: #fff; }
    .btn-buzzer:hover:not(:disabled) { box-shadow: 0 6px 20px rgba(167,139,250,0.4); }

    /* ── Log box ── */
    #log-box {
      width: 100%;
      max-width: 740px;
      background: #0f172a;
      border: 1px solid #1e3a5f;
      border-radius: 12px;
      padding: 12px;
      height: 160px;
      overflow-y: auto;
      font-family: 'Consolas', monospace;
      font-size: 0.78rem;
      color: #94a3b8;
    }
    #log-box p { padding: 2px 0; border-bottom: 1px solid #1e293b; }
    #log-box p:last-child { border-bottom: none; }
    .log-info { color: #7dd3fc; }
    .log-warn { color: #fbbf24; }
    .log-ok   { color: #4ade80; }
    .log-err  { color: #f87171; }
  </style>
</head>

<body>

  <h1>🌡️ IoT Dashboard – DHT22</h1>

  <!-- Trạng thái kết nối -->
  <div id="status-bar">
    <div class="dot" id="ws-dot"></div>
    <span id="ws-status">Đang kết nối WebSocket...</span>
    &nbsp;|&nbsp;
    <div class="dot" id="esp-dot"></div>
    <span id="esp-status">ESP chưa kết nối</span>
  </div>

  <!-- Mode banner -->
  <div id="mode-banner">
    <div>
      <h2>Chế độ điều khiển</h2>
      <div id="mode-info">
        <span id="mode-badge" class="badge badge-mode-auto">🤖 AUTO</span>
        <span class="auto-lock-hint">Nút điều khiển bị khoá khi đang AUTO</span>
      </div>
    </div>
    <div class="mode-btns">
      <button class="btn-mode active" id="btn-mode-auto"   data-mode="AUTO"   onclick="setMode('AUTO')">🤖 AUTO</button>
      <button class="btn-mode"        id="btn-mode-manual" data-mode="MANUAL" onclick="setMode('MANUAL')">🕹️ MANUAL</button>
    </div>
  </div>

  <!-- Dữ liệu cảm biến -->
  <div class="grid">
    <div class="card">
      <div class="card-label">Nhiệt độ</div>
      <div class="card-value" id="temp-val">--<span class="card-unit">°C</span></div>
    </div>
    <div class="card">
      <div class="card-label">Độ ẩm</div>
      <div class="card-value" id="humi-val">--<span class="card-unit">%</span></div>
    </div>
    <div class="card">
      <div class="card-label">Trạng thái</div>
      <div class="card-state-wrap">
        <div id="app-state-badge" class="badge badge-normal">NORMAL</div>
      </div>
    </div>
  </div>

  <!-- Điều khiển -->
  <div id="ctrl-card">
    <h2>Điều khiển thiết bị</h2>

    <!-- Quạt -->
    <div class="ctrl-row">
      <span class="ctrl-label">🌀 Quạt</span>
      <span id="fan-state-text" class="off">OFF</span>
      <button class="btn btn-on"  id="btn-fan-on"  onclick="setFan('ON')" >Bật</button>
      <button class="btn btn-off" id="btn-fan-off" onclick="setFan('OFF')">Tắt</button>
    </div>

    <!-- Còi -->
    <div class="ctrl-row">
      <span class="ctrl-label">🔔 Còi</span>
      <span id="buzzer-state-text" class="off">OFF</span>
      <button class="btn btn-buzzer" id="btn-buzzer-off" onclick="buzzerOff()">Tắt còi</button>
    </div>
  </div>

  <!-- Log -->
  <div id="log-box"></div>

  <script src="app.js"></script>
</body>
</html>
